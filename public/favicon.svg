<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <!-- Rounded square background for high visibility in browser tabs -->
  <rect width="512" height="512" rx="128" fill="url(#bg-gradient)" />
  
  <!-- Minimalist House Icon -->
  <!-- Main white roof & body outline -->
  <path d="M256 120L100 260H160V380C160 391 169 400 180 400H332C343 400 352 391 352 380V260H412L256 120Z" fill="#FFFFFF" />
  
  <!-- Accent Façade Wall (Vibrant Turquoise #0D9488) representing the newly coated facade -->
  <path d="M256 220V400H328C339 400 348 391 348 380V220H256Z" fill="#0D9488" />
  
  <!-- Stylized Window (Deep Blue #1E3A5F) -->
