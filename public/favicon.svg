  <defs>
    <linearGradient id="bg-gradient" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#1E3A5F" />
      <stop offset="100%" stop-color="#0F2440" />
    </linearGradient>
  </defs>
